# Supabase CLI config for MoveHome.org
# https://supabase.com/docs/guides/cli/config
#
# Project ref: vfnpmtqxrffppqajxxpb (eu-west-2, Vercel-managed)
# Region:      eu-west-2
# Plan:        Free
#
# After cloning: `supabase link --project-ref vfnpmtqxrffppqajxxpb`
# To apply migrations remotely: `supabase db push`
# To pull a fresh remote dump:  `supabase db pull`

project_id = "movehome"

[db]
major_version = 17

[db.migrations]
